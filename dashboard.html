<!-- Add Vessel Modal -->
<div class="modal fade" id="addVesselModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">

      </div>
      <div class="modal-body">

          <input type="hidden" id="vesselLat">
          <input type="hidden" id="vesselLng">
          <div class="mb-3">

          </div>
          <div class="mb-3">
            <label class="form-label">Extra Info</label>
            <input type="text" class="form-control" id="vesselExtra">
          </div>
          <div class="text-end">
            <button type="submit" class="btn text-white" style="background-color: #06326a;">Add Vessel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Sidebar toggle
  document.getElementById("toggle-btn").addEventListener("click", function () {
    document.getElementById("sidebar").classList.toggle("collapsed");
  });

 // ============ NOTIFICATION SYSTEM (MOVED TO GLOBAL SCOPE) ============
  // Sample user data for demo
  const sampleUsers = [
    { name: 'Aira Rocel Nazareno', email: 'airarocel@email.com' },
    { name: 'Ruzzel Mae Padrones', email: 'ruzzelmae@email.com' },
    { name: 'Ashlei Krystel Panes', email: 'ashleikrystel@email.com' },
    { name: 'Elena Mae Mendoza', email: 'elenamae@email.com' },
  ];

  let notifications = [];

  // Elements
  const notifBell = document.getElementById('notifBell');
  const notifDropdown = document.getElementById('notifDropdown');
  const notifBadge = document.getElementById('notifBadge');
  const notifList = document.getElementById('notifList');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const toastMessage = document.getElementById('toastMessage');

  // Toggle dropdown
  notifBell.addEventListener('click', (e) => {
    e.stopPropagation();
    notifDropdown.classList.toggle('show');
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (!notifDropdown.contains(e.target) && e.target !== notifBell) {
      notifDropdown.classList.remove('show');
    }
  });

  // Add notification
  function addNotification() {
    const user = sampleUsers[Math.floor(Math.random() * sampleUsers.length)];
    const notification = {
      id: Date.now(),
      user: user.name,
      email: user.email,
      time: 'Just now'
    };
    
    notifications.unshift(notification);
    updateNotificationUI();
    showToast('New registration request received!', 'success');
  }

  // Update notification UI
  function updateNotificationUI() {
    // Update badge
    if (notifications.length > 0) {
      notifBadge.textContent = notifications.length;
      notifBadge.classList.remove('d-none');
    } else {
      notifBadge.classList.add('d-none');
    }

    // Update list
    if (notifications.length === 0) {
      notifList.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-bell-slash"></i>
          <p>No new notifications</p>
        </div>
      `;
      return;
    }

    notifList.innerHTML = notifications.map(notif => `
      <div class="notif-item" data-id="${notif.id}">
        <div class="notif-icon">
          <i class="fas fa-user-plus"></i>
        </div>
        <div class="notif-content">
          <div class="notif-user">${notif.user}</div>
          <div class="notif-message">${notif.email}</div>
          <div class="notif-time">${notif.time}</div>
        </div>
        <div class="notif-actions">
          <button class="action-btn accept-btn" onclick="acceptUser(${notif.id})">
            <i class="fas fa-check"></i>
          </button>
          <button class="action-btn decline-btn" onclick="declineUser(${notif.id})">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
    `).join('');
  }

  // Accept user
  function acceptUser(id) {
    const notif = notifications.find(n => n.id === id);
    if (notif) {
      notifications = notifications.filter(n => n.id !== id);
      updateNotificationUI();
      showToast(`${notif.user} has been accepted!`, 'success');
      
      // Here you would typically make an API call to accept the user
      console.log('Accepting user:', notif);
    }
  }

  // Decline user
  function declineUser(id) {
    const notif = notifications.find(n => n.id === id);
    if (notif) {
      notifications = notifications.filter(n => n.id !== id);
      updateNotificationUI();
      showToast(`${notif.user} has been declined.`, 'error');
      
      // Here you would typically make an API call to decline the user
      console.log('Declining user:', notif);
    }
  }

  // Clear all notifications
  clearAllBtn.addEventListener('click', () => {
    if (notifications.length > 0) {
      notifications = [];
      updateNotificationUI();
      showToast('All notifications cleared', 'success');
    }
  });

  // Show toast message
  function showToast(message, type) {
    toastMessage.textContent = message;
    toastMessage.className = `toast-message toast-${type} show`;
    
    setTimeout(() => {
      toastMessage.classList.remove('show');
    }, 3000);
  }

  // Make functions globally accessible
  window.acceptUser = acceptUser;
  window.declineUser = declineUser;

  // Initial UI update
  updateNotificationUI();

  // Auto-add demo notifications every 10 seconds (optional - remove if not needed)
  setInterval(() => {
    if (notifications.length < 5) { // Limit to 5 notifications
      addNotification();
    }
  }, 10000);

  // ============ MAP AND VESSEL SYSTEM ============
  var map = L.map('map').setView([7.1907, 125.4553], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    minZoom: 6,
    maxZoom: 18,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  var vessels = [];
  var vesselList = document.getElementById("vesselList");

  function addVessel(name, where, type, extra, lat, lng) {
    var marker = L.marker([lat, lng])
      .addTo(map)
      .bindPopup("<b>" + name + "</b><br>" + where + "<br>");

    var vessel = { name, where, type, extra, lat, lng, marker };
    vessels.push(vessel);

    var card = document.createElement("div");
    card.className = "vessel-card shadow-sm";
    card.innerHTML = `
      <h5 class="mb-1">${name}</h5>
      <p class="mb-1"><strong> Current location:</strong> ${where}</p>
      <div class="d-flex justify-content-end">
        <button class="btn btn-sm btn-outline-primary me-2">View</button>
        <button class="btn btn-sm btn-outline-primary me-2">Delete</button>
      </div>
    `;
    document.getElementById("vesselList").appendChild(card);
  }

  map.on('click', function(e) {
    document.getElementById("vesselLat").value = e.latlng.lat;
    document.getElementById("vesselLng").value = e.latlng.lng;
    var addModal = new bootstrap.Modal(document.getElementById("addVesselModal"));
    addModal.show();
  });

  document.getElementById("addVesselForm").addEventListener("submit", function(e) {
    e.preventDefault();

    var name = document.getElementById("vesselName").value.trim();
    var where = document.getElementById("vesselWhere").value.trim();
    var type = document.getElementById("vesselType").value.trim();
    var extra = document.getElementById("vesselExtra").value.trim() || "N/A";
    var lat = parseFloat(document.getElementById("vesselLat").value);
    var lng = parseFloat(document.getElementById("vesselLng").value);

    addVessel(name, where, type, extra, lat, lng);

    var addModal = bootstrap.Modal.getInstance(document.getElementById("addVesselModal"));
    addModal.hide();
    e.target.reset();
  });

  // Demo vessels
  addVessel("Vessel A", "Davao Gulf", "Fishing Boat", "Capacity: 30 tons", 7.0920, 125.6330);
  addVessel("Vessel B", "Samal Island", "Passenger Ferry", "Status: Active", 7.1417, 125.7097);
  addVessel("Vessel C", "Mati", "Cargo Ship", "Last updated: Today", 6.9556, 126.2167);
</script>
